name: Deploy Olist Store presentation

on:
  push:
    branches:
      - main
    paths:
      - 'presentation/**'
      - '.github/workflows/deploy-olist-store-presentation.yml'
  workflow_dispatch:

concurrency:
  group: olist-store-presentation-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy to Yandex Object Storage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      S3_ENDPOINT: https://storage.yandexcloud.net
      S3_BUCKET: olist-store.edu.werserk.com
      PUBLIC_URL: https://olist-store.edu.werserk.com/
      AWS_ACCESS_KEY_ID: ${{ secrets.YC_S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_S3_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ru-central1
      AWS_EC2_METADATA_DISABLED: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: presentation/package-lock.json

      - name: Install dependencies
        working-directory: presentation
        run: npm ci

      - name: Build
        working-directory: presentation
        run: npm run build

      - name: Ensure AWS CLI
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            python -m pip install --user awscli
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
          aws --version

      - name: Deploy files
        working-directory: presentation
        run: |
          set -euo pipefail
          aws --endpoint-url="$S3_ENDPOINT" s3 sync dist/ "s3://$S3_BUCKET/" --delete --only-show-errors

          while IFS= read -r -d '' file; do
            key="${file#dist/}"
            aws --endpoint-url="$S3_ENDPOINT" s3 cp "$file" "s3://$S3_BUCKET/$key" \
              --content-type 'text/html; charset=utf-8' \
              --cache-control 'no-cache' \
              --only-show-errors
          done < <(find dist -type f -name '*.html' -print0)

          while IFS= read -r -d '' file; do
            key="${file#dist/}"
            aws --endpoint-url="$S3_ENDPOINT" s3 cp "$file" "s3://$S3_BUCKET/$key" \
              --content-type 'text/css' \
              --cache-control 'public, max-age=31536000, immutable' \
              --only-show-errors
          done < <(find dist -type f -name '*.css' -print0)

          while IFS= read -r -d '' file; do
            key="${file#dist/}"
            aws --endpoint-url="$S3_ENDPOINT" s3 cp "$file" "s3://$S3_BUCKET/$key" \
              --content-type 'application/javascript' \
              --cache-control 'public, max-age=31536000, immutable' \
              --only-show-errors
          done < <(find dist -type f -name '*.js' -print0)

          while IFS= read -r -d '' file; do
            key="${file#dist/}"
            aws --endpoint-url="$S3_ENDPOINT" s3 cp "$file" "s3://$S3_BUCKET/$key" \
              --content-type 'image/svg+xml' \
              --cache-control 'public, max-age=31536000, immutable' \
              --only-show-errors
          done < <(find dist -type f -name '*.svg' -print0)

      - name: Verify production
        run: |
          set -euo pipefail
          html="$(curl -4 -fsSL --retry 20 --retry-delay 10 --retry-all-errors "$PUBLIC_URL")"
          grep -q '<title>Сезонность продаж Olist Store - Slidev' <<< "$html"

          css_path="$(grep -oE "/assets/[^\"' ]+\.css" <<< "$html" | sed -n '1p')"
          js_path="$(grep -oE "/assets/[^\"' ]+\.js" <<< "$html" | sed -n '1p')"

          test -n "$css_path"
          test -n "$js_path"

          curl -4 -fsSI --retry 20 --retry-delay 10 --retry-all-errors "$PUBLIC_URL${css_path#/}" | grep -i '^content-type: text/css'
          curl -4 -fsSI --retry 20 --retry-delay 10 --retry-all-errors "$PUBLIC_URL${js_path#/}" | grep -Ei '^content-type: (application/javascript|text/javascript)'
